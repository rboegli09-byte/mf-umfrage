<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin – MF 6S.180 Umfrage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=5">
  <!-- SheetJS für Excel-Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Chart.js für die Auswertungs-Diagramme -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body class="admin-page">

  <header class="survey-header">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Startseite
    </a>
    <div class="header-logo">ADMIN</div>
  </header>

  <main class="survey-main">
    <div class="admin-container">

      <!-- LOGIN -->
      <div class="form-section" id="loginCard">
        <h2 class="section-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Admin-Bereich
        </h2>
        <p style="font-size:14px;color:var(--gray-500);margin-bottom:18px;line-height:1.6;">
          Geben Sie das Passwort ein, um alle Umfrage-Antworten anzuzeigen und als Excel
          oder CSV zu exportieren.
        </p>
        <div class="field-group">
          <label for="tokenInput">Passwort</label>
          <input type="password" id="tokenInput" placeholder="••••••••" autocomplete="current-password">
          <span class="field-error" id="loginError"></span>
        </div>
        <button class="btn btn-primary btn-full" id="loginBtn">Anmelden</button>
      </div>

      <!-- DATEN -->
      <div class="hidden" id="dataCard">
        <div class="form-section">
          <div class="admin-toolbar">
            <div>
              <h2 style="font-size:18px;font-weight:700;margin-bottom:4px;">Umfrage-Antworten</h2>
              <span class="count-badge" id="countBadge">0 Antworten</span>
            </div>
            <button class="btn btn-outline btn-sm" id="btnLogout">Abmelden</button>
          </div>

          <div class="admin-actions">
            <button class="btn btn-primary" id="btnXlsx">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Excel (.xlsx)
            </button>
            <button class="btn btn-outline" id="btnCsv">CSV exportieren</button>
            <button class="btn btn-outline" id="btnRefresh">Aktualisieren</button>
            <button class="btn btn-outline btn-danger" id="btnClear">Alle löschen</button>
          </div>

          <p class="status-line" id="statusLine"></p>
        </div>

        <!-- AUSWERTUNG / DIAGRAMME -->
        <div class="form-section" id="statsCard">
          <h2 class="section-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>
            </svg>
            Auswertung
          </h2>

          <div class="stat-total">
            <div class="stat-total-number" id="statTotal">0</div>
            <div class="stat-total-label">Teilnehmer haben die Umfrage ausgefüllt</div>
          </div>

          <div class="charts-grid" id="chartsGrid"></div>
        </div>

        <div class="form-section" style="padding:0;overflow:hidden;">
          <div class="table-wrap" id="tableWrap"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="js/config.js?v=5"></script>
  <script src="js/admin.js?v=5"></script>
</body>
</html>
